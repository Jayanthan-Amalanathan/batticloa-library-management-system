<head>

<meta property="og:description" content="Workshops, exhibitions, story times, author meets and more at Batticaloa Public Library. Most events are free and open to all." />

<meta property="og:site_name" content="Batticaloa Public Library" />

<noscript>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700&family=Noto+Sans+Sinhala:wght@400;600;700&display=swap" />
</noscript>

</head>
<body data-page="events">
<a class="skip-link" href="#main-content">Skip to main content</a>
<div id="site-header"></div>
<main id="main-content">

<section class="page-hero">
  <div class="container">
    <p class="breadcrumbs"><a href="/" data-i18n="common.home">Home</a> / <span data-i18n="nav.events">Events</span></p>
    <h1 data-i18n="events.hero.title">Programs & Events</h1>
    <p data-i18n="events.hero.desc">Workshops, exhibitions, story times, author meets and more. Most events are free and open to all.</p>
  </div>
</section>

<section>
  <div class="container">
    <div class="filter-pills" role="group" aria-label="Filter events">
      <button class="btn btn-ghost active" data-filter="all" data-i18n="events.filter.all">All Events</button>
      <button class="btn btn-ghost" data-filter="upcoming" data-i18n="events.filter.upcoming">Upcoming</button>
      <button class="btn btn-ghost" data-filter="workshop" data-i18n="events.filter.workshop">Workshops</button>
      <button class="btn btn-ghost" data-filter="children" data-i18n="events.filter.children">Children</button>
      <button class="btn btn-ghost" data-filter="author" data-i18n="events.filter.author">Author Meets</button>
      <button class="btn btn-ghost" data-filter="training" data-i18n="events.filter.training">Training</button>
      <button class="btn btn-ghost" data-filter="exhibition" data-i18n="events.filter.exhibition">Exhibitions</button>
    </div>

    <div id="event-count" class="card-meta mb-3" aria-live="polite"></div>
    <div id="events-list" class="grid grid-3" role="list" aria-label="Events"></div>
  </div>
</section>

<!-- Registration modal -->
<div id="modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button id="modal-close" class="modal-close" aria-label="Close registration form">✕</button>
    </div>
    <div id="modal-msg"></div>
    <form id="reg-form" novalidate>
      <input type="hidden" id="reg-event-id" />
      <div class="form-group">
        <label for="reg-name" data-i18n="contact.form.name">Full Name *</label>
        <input type="text" id="reg-name" name="name" required autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="reg-email" data-i18n="contact.form.email">Email Address *</label>
        <input type="email" id="reg-email" name="email" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="reg-phone" data-i18n="contact.form.phone">Phone Number</label>
        <input type="tel" id="reg-phone" name="phone" autocomplete="tel" placeholder="+94 7X XXX XXXX" />
      </div>
      <button class="btn btn-primary btn-block" type="submit" id="reg-submit">Confirm Registration</button>
    </form>
    <p class="card-meta mt-2 text-center" style="font-size:0.82rem;">A confirmation will be sent to your email address.</p>
  </div>
</div>

</main>
<div id="site-footer"></div>
<script src="/js/app.js" defer></script>
<script src="/js/events.js" defer></script>

<!-- AI Chat Widget -->
<button class="chat-fab" id="chat-fab" aria-label="Open library assistant chat" title="Chat with Library Assistant">
  <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</button>

<div class="chat-window" id="chat-window" role="dialog" aria-label="Library AI Assistant" aria-modal="true">
  <div class="chat-head">
    <div class="chat-head-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div class="chat-head-text">
      <strong>Library Assistant</strong>
      <small>Batticaloa Public Library</small>
    </div>
    <div class="chat-head-actions">
      <button class="chat-minimize-btn" id="chat-minimize-btn" aria-label="Minimize chat" title="Minimise">
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="chat-close-btn" id="chat-close-btn" aria-label="Close chat" title="Close and restart">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div class="chat-messages" id="chat-messages" aria-live="polite"></div>
  <div class="chat-suggestions" id="chat-suggestions">
    <button class="chat-suggestion">Library hours &amp; location</button>
    <button class="chat-suggestion">Recommend a Tamil book</button>
    <button class="chat-suggestion" lang="ta">புத்தக பரிந்துரை</button>
    <button class="chat-suggestion">Membership registration</button>
  </div>
  <div class="chat-footer">
    <input type="text" id="chat-input" placeholder="Ask about books or the library…" aria-label="Chat message" autocomplete="off" />
    <button class="chat-send-btn" id="chat-send-btn" aria-label="Send message">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script src="/js/home.js" defer></script>
<script src="/js/chat.js" defer></script>
</body>
</html>
