<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Catalog Search — Batticaloa Public Library</title>
<meta name="description" content="Search the Batticaloa Public Library catalog." />
<meta name="robots" content="index, follow" />
<link rel="canonical" href="https://batticloa-library-management-system.vercel.app/catalog" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://batticloa-library-management-system.vercel.app/catalog" />
<meta property="og:title" content="Catalog Search — Batticaloa Public Library" />
<meta property="og:description" content="Search the Batticaloa Public Library catalog." />
<meta property="og:image" content="https://batticloa-library-management-system.vercel.app/images/hero-library.svg" />
<meta property="og:site_name" content="Batticaloa Public Library" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Catalog Search — Batticaloa Public Library" />
<meta name="twitter:description" content="Search the Batticaloa Public Library catalog." />
<meta name="twitter:image" content="https://batticloa-library-management-system.vercel.app/images/hero-library.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@700;800&display=swap" fetchpriority="high" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@700;800&display=swap" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700&family=Noto+Sans+Sinhala:wght@400;600;700&display=swap" />
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@700;800&display=swap" /></noscript>
<link rel="icon" type="image/svg+xml" href="/images/logo.svg" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body data-page="catalog">
<a class="skip-link" href="#main-content">Skip to main content</a>
<div id="site-header"></div>
<main id="main-content">

<section class="page-hero">
  <div class="container">
    <p class="breadcrumbs"><a href="/" data-i18n="common.home">Home</a> / <span data-i18n="nav.catalog">Catalog</span></p>
    <h1 data-i18n="catalog.hero.title">Search the Catalog</h1>
    <p data-i18n="catalog.hero.desc">Browse our local library catalog.</p>
  </div>
</section>

<section>
  <div class="container">

    <!-- Search bar -->
    <div class="filter-bar" role="search" aria-label="Search catalog">
      <input type="text" id="q" data-i18n-placeholder="catalog.placeholder" placeholder="Search title, author, ISBN…" aria-label="Search query" />
      <select id="category" aria-label="Category">
        <option value="">All categories</option>
        <option>Biography</option><option>Computer Science</option><option>Fiction</option>
        <option>General</option><option>History</option><option>Memoir</option>
        <option>Non-Fiction</option><option>Science</option><option>Science Fiction</option>
        <option>Self-Help</option>
      </select>
      <select id="collection" aria-label="Collection type">
        <option value="">All collections</option>
        <option value="lending">Lending</option>
        <option value="reference">Reference</option>
        <option value="special">Special Collection</option>
        <option value="periodicals">Periodicals</option>
      </select>
      <select id="language-filter" aria-label="Language">
        <option value="">All languages</option>
        <option value="English">English</option>
        <option value="Tamil">Tamil</option>
        <option value="Sinhala">Sinhala</option>
      </select>
      <select id="branch" aria-label="Branch">
        <option value="">All branches</option>
        <option>Main</option>
        <option>Children's Branch</option>
      </select>
      <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.88rem;color:var(--text-soft);white-space:nowrap;">
        <input type="checkbox" id="available-only" style="width:auto;" /> <span data-i18n="catalog.available">Available only</span>
      </label>
      <button class="btn btn-primary" id="search-btn" aria-label="Search catalog" data-i18n="catalog.search">Search</button>
    </div>

    <!-- Results -->
    <div class="flex-between mb-3">
      <div id="result-count" class="card-meta" aria-live="polite">Loading…</div>
      <div id="sort-wrap" style="display:flex;gap:0.5rem;align-items:center;">
        <label for="sort" style="font-size:0.85rem;color:var(--text-muted);" data-i18n="catalog.sort">Sort:</label>
        <select id="sort" style="width:auto;padding:0.4rem 2rem 0.4rem 0.7rem;" aria-label="Sort results">
          <option value="newest" data-i18n="catalog.sort.newest">Newest First</option>
          <option value="title" data-i18n="catalog.sort.title">Title A–Z</option>
          <option value="author" data-i18n="catalog.sort.author">Author A–Z</option>
        </select>
      </div>
    </div>
    <div id="results" class="grid grid-4" role="list" aria-label="Search results"></div>
    <div class="text-center mt-4 hidden" id="load-more-wrap">
      <button class="btn btn-outline" id="load-more">Load more results</button>
    </div>

  </div>
</section>

</main>
<div id="site-footer"></div>
<script src="/js/app.js" defer></script>
<script src="/js/catalog.js" defer></script>

<!-- AI Chat Widget -->
<button class="chat-fab" id="chat-fab" aria-label="Open library assistant chat" title="Chat with Library Assistant">
  <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</button>

<div class="chat-window" id="chat-window" role="dialog" aria-label="Library AI Assistant" aria-modal="true">
  <div class="chat-head">
    <div class="chat-head-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div class="chat-head-text">
      <strong>Library Assistant</strong>
      <small>Batticaloa Public Library</small>
    </div>
    <div class="chat-head-actions">
      <button class="chat-minimize-btn" id="chat-minimize-btn" aria-label="Minimize chat" title="Minimise">
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="chat-close-btn" id="chat-close-btn" aria-label="Close chat" title="Close and restart">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div class="chat-messages" id="chat-messages" aria-live="polite"></div>
  <div class="chat-suggestions" id="chat-suggestions">
    <button class="chat-suggestion">Library hours &amp; location</button>
    <button class="chat-suggestion">Recommend a Tamil book</button>
    <button class="chat-suggestion" lang="ta">புத்தக பரிந்துரை</button>
    <button class="chat-suggestion">Membership registration</button>
  </div>
  <div class="chat-footer">
    <input type="text" id="chat-input" placeholder="Ask about books or the library…" aria-label="Chat message" autocomplete="off" />
    <button class="chat-send-btn" id="chat-send-btn" aria-label="Send message">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script src="/js/home.js" defer></script>
<script src="/js/chat.js" defer></script>
</body>
</html>
