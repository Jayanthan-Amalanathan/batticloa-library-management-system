  <!-- Tamil text -->
  <text x="200" y="58" font-family="'Noto Sans Tamil', 'Tamil MN', serif" font-size="44" font-weight="700" fill="#111111" letter-spacing="1">மட்டக்களப்பு பொது நூலகம்</text>

  <!-- Sinhala text -->
