<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#062f3a"/>
      <stop offset="60%" stop-color="#0e4d5c"/>
      <stop offset="100%" stop-color="#1a7387"/>
    </linearGradient>
    <linearGradient id="goldShelf" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#c89014"/>
      <stop offset="100%" stop-color="#8a6310"/>
