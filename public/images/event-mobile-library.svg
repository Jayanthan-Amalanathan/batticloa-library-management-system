<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <defs>
    <linearGradient id="mlg" x1="0" y1="0" x2="400" y2="225" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#mlg)"/>
  <!-- Ground -->
  <rect x="0" y="170" width="400" height="55" fill="#0d1f2d" opacity="0.8"/>
  <!-- Road markings -->
  <rect x="50" y="178" width="30" height="5" rx="2" fill="#f6d860" opacity="0.4"/>
  <rect x="130" y="178" width="30" height="5" rx="2" fill="#f6d860" opacity="0.4"/>
  <rect x="210" y="178" width="30" height="5" rx="2" fill="#f6d860" opacity="0.4"/>
  <rect x="290" y="178" width="30" height="5" rx="2" fill="#f6d860" opacity="0.4"/>
  <!-- Bus body -->
  <rect x="60" y="95" width="280" height="80" rx="14" fill="#e67e22" opacity="0.9"/>
  <!-- Windows -->
  <rect x="80" y="108" width="38" height="28" rx="5" fill="#aed6f1" opacity="0.85"/>
  <rect x="130" y="108" width="38" height="28" rx="5" fill="#aed6f1" opacity="0.85"/>
  <rect x="180" y="108" width="38" height="28" rx="5" fill="#aed6f1" opacity="0.85"/>
  <rect x="230" y="108" width="38" height="28" rx="5" fill="#aed6f1" opacity="0.85"/>
  <!-- Book shelf visible through windows -->
  <rect x="83" y="113" width="32" height="5" rx="2" fill="#d35400" opacity="0.5"/>
  <rect x="133" y="113" width="32" height="5" rx="2" fill="#d35400" opacity="0.5"/>
  <!-- Door -->
  <rect x="282" y="108" width="42" height="38" rx="5" fill="#7fb3d3" opacity="0.7"/>
  <!-- Wheels -->
  <circle cx="120" cy="175" r="18" fill="#2c3e50" stroke="#7f8c8d" stroke-width="3"/>
  <circle cx="120" cy="175" r="8" fill="#7f8c8d"/>
  <circle cx="280" cy="175" r="18" fill="#2c3e50" stroke="#7f8c8d" stroke-width="3"/>
  <circle cx="280" cy="175" r="8" fill="#7f8c8d"/>
  <!-- Book icon on bus side -->
  <rect x="155" y="140" width="22" height="18" rx="2" fill="#fff" opacity="0.8"/>
  <rect x="159" y="143" width="14" height="2" rx="1" fill="#e67e22" opacity="0.8"/>
  <rect x="159" y="147" width="10" height="2" rx="1" fill="#e67e22" opacity="0.8"/>
  <rect x="159" y="151" width="12" height="2" rx="1" fill="#e67e22" opacity="0.8"/>
  <!-- Label -->
  <text x="200" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#f6d860" opacity="0.95" letter-spacing="1">MOBILE LIBRARY</text>
  <text x="200" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#fff" opacity="0.7" letter-spacing="1">நடமாடும் நூலகம்</text>
</svg>
