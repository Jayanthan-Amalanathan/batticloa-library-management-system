<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Member Login — Batticaloa Public Library</title>
<meta name="description" content="Sign in to your Batticaloa Public Library member account to access loans, reservations and digital resources." />
<meta name="robots" content="noindex, follow" />
<link rel="canonical" href="https://batticloa-library-management-system.vercel.app/login" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700;800&display=swap" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700;800&display=swap" />
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700;800&display=swap" /></noscript>
<link rel="icon" type="image/svg+xml" href="/images/logo.svg" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body data-page="login">
<div id="site-header"></div>
<main id="main-content">

<section class="page-hero" style="padding-bottom:2rem;">
  <div class="container">
    <p class="breadcrumbs"><a href="/">Home</a> / Login</p>
    <h1>Member Login</h1>
    <p>Access your dashboard, loans, reservations and digital resources.</p>
  </div>
</section>

<section>
  <div class="container">
    <div class="form-card">
      <div style="text-align:center;margin-bottom:1.5rem;">
        <img src="/images/logo.svg" alt="" style="width:52px;margin:0 auto 0.75rem;" aria-hidden="true" width="52" height="52" />
        <h2 style="margin-bottom:0.25rem;">Welcome Back</h2>
        <p class="card-meta">Sign in to your library account</p>
      </div>
      <div id="msg"></div>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" name="email" autocomplete="email" required placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="input-wrap">
            <input type="password" id="login-password" name="password" autocomplete="current-password" required placeholder="Enter your password" />
            <button type="button" class="toggle-pw" aria-label="Toggle password visibility" data-target="login-password">👁</button>
          </div>
        </div>
        <button class="btn btn-primary btn-block" type="submit" id="login-btn" style="margin-top:0.5rem;">Sign In</button>
      </form>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;flex-wrap:wrap;gap:0.5rem;">
        <p class="card-meta">Not yet a member? <a href="/register">Join the library →</a></p>
        <a href="/contact" class="card-meta" style="font-size:0.83rem;">Forgot password?</a>
      </div>

    </div>
  </div>
</section>

</main>
<div id="site-footer"></div>
<script src="/js/app.js" defer></script>
<script src="/js/login.js" defer></script>
</body>
</html>
